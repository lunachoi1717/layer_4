server:
  port: 8102

spring:
  application:
    name: ventalize
  datasource:
    url: jdbc:postgresql://localhost:5433/ventalize
    username: pgadmin
    password: 1004
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

# 업로드 이미지 저장 경로 (프로젝트 루트/uploads)
file:
  upload-dir: uploads
  images-dir: ../../frontend/public/images
